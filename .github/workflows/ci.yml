name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scala:
          - "2.13.16"
          - "3.3.0"
          - "3.3.1"
          - "3.3.3"
          - "3.3.4"
          - "3.3.5"
          - "3.3.6"
          - "3.3.7"
          - "3.4.0"
          - "3.4.1"
          - "3.4.2"
          - "3.4.3"
          - "3.5.0"
          - "3.5.1"
          - "3.5.2"
          - "3.6.2"
          - "3.6.3"
          - "3.6.4"
          - "3.7.0"
          - "3.7.1"
          - "3.7.2"
          - "3.7.3"
          - "3.7.4"
          - "3.8.0"
          - "3.8.1"
          - "3.8.2"
    name: Test on Scala ${{ matrix.scala }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: sbt
      - name: Run tests
        run: sbt "++${{ matrix.scala }}; tests/test"
