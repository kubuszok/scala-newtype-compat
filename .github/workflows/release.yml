name: Sonatype Release

on:
  push:
    branches: [master]
    tags: ["*"]

jobs:
  release-tag:
    runs-on: ubuntu-latest

    name: ${{ startsWith(github.ref, 'refs/tags/') && 'Publish Tag as Release' || 'Publish Snapshot' }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: coursier/cache-action@v8
      - name: Import GPG key for signing the release
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: "temurin:1.17.0.15"
          apps: sbt
      - name: Publish all projects
        # `+publishSigned` cross-publishes every version in crossScalaVersions (all Scala 3
        # versions for the plugin, 2.13 + 3 for compat). The plugin's `ci-release` command runs
        # a bare `publishSigned`, which only publishes each module's default scalaVersion.
        # On a tag, also release the staged Sonatype bundle.
        run: sbt "+publishSigned" ${{ startsWith(github.ref, 'refs/tags/') && 'sonaRelease' || '' }}
        env:
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
