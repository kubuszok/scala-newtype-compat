# Scala versions for this repo are managed BY HAND in project/scala*-versions.txt. The compiler
# plugin is cross-published for the FULL Scala 3 matrix (3.3 LTS .. 3.x Next), so new versions are
# ADDED to the matrix rather than overriding a single default — if Scala Steward bumped the default
# scalaVersion it would effectively replace, not extend, the matrix. So ignore the whole
# org.scala-lang group. (No sbt pin: this repo intentionally runs on sbt 2.0 / JDK 17, and the JDK
# floor per Scala version is set explicitly via -release in build.sbt.)
updates.ignore = [
  { groupId = "org.scala-lang" }
]
